<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Inventory Item List</ion-title>
    <ion-button slot="end" fill="clear">Help</ion-button>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Item Search Bar -->
  <ion-item class="ion-margin-bottom">
    <ion-label position="floating">Search Item Name</ion-label>
    <ion-input [(ngModel)]="searchKeyword" (input)="searchItemsByName()"></ion-input>
  </ion-item>

  <!-- Inventory Item Cards -->
  <ion-card *ngFor="let item of filteredItemList" class="ion-margin-bottom">
    <ion-card-header>
      <ion-card-title>{{item.name}}</ion-card-title>
      <ion-card-subtitle>Category: {{item.category}}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p>Quantity: {{item.quantity}}</p>
      <p>Price: ${{item.price}}</p>
      <p>Stock Status: {{item.status}}</p>
      <p>Supplier: {{item.supplier}}</p>
    </ion-card-content>
  </ion-card>

</ion-content>
